<!-- Header Component -->
<div class="header-area bg-secondary mx-0">
    <div class="container mw-1690">
        <div class="row align-items-center gy-2">
            <div class="col-xl-6 col-lg-7">
                <ul class="d-flex flex-wrap justify-content-center justify-content-lg-start flex-md-nowrap align-items-center p-0 m-0 list-unstyled header-info">
                    <li class="d-flex align-items-center gap-6">
                        <span class="fw-semibold">Location:</span>
                        <span>Doha, Qatar</span>
                    </li>
                    <li class="d-flex align-items-center gap-6">
                        <span class="fw-semibold">Email:</span>
                        <a href="mailto:info@qatarpaint.com" class="text-decoration-none">info@qatarpaint.com</a>
                    </li>
                </ul>
            </div>
            <div class="col-xl-6 col-lg-5">
                <div class="d-flex justify-content-center justify-content-lg-end align-items-center link-social-wrap">
                    <div class="d-flex link">
                        <a href="/about">About</a>
                        <a href="/faq">FAQ</a>
                        <a href="/testimonials">Testimonials</a>
                    </div>

                    <div class="d-flex align-items-center justify-content-center justify-content-lg-end">
                        <div class="social-link d-flex align-items-center">
                            <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook">
                                <i class="ti ti-brand-facebook"></i>
                            </a>
                            <a href="https://twitter.com/" target="_blank" aria-label="Twitter">
                                <i class="ti ti-brand-x"></i>
                            </a>
                            <a href="https://www.instagram.com/" target="_blank" aria-label="Instagram">
                                <i class="ti ti-brand-instagram"></i>
                            </a>
                        </div>

                        <!-- Language Switcher -->
                        <div class="language-switcher">
                            <button class="lang-btn active" data-lang="en" onclick="i18n.switchLanguage('en')">EN</button>
                            <button class="lang-btn" data-lang="ar" onclick="i18n.switchLanguage('ar')">عربي</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
